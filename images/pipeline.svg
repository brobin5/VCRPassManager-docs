<svg viewBox="0 0 1180 1330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How VCR Manager works: seven staged pipeline" font-family="Segoe UI, system-ui, sans-serif" style="width:100%;height:auto;background:#191c21;border-radius:12px"><defs><marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#4d8fd6"/></marker><marker id="ahv" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#8f7fd6"/></marker><marker id="aht" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#3fae9d"/></marker><marker id="ahd" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#9aa0a8"/></marker></defs><line x1="118" y1="40" x2="118" y2="134" stroke="#3a4048" stroke-width="1"/><circle cx="76" cy="87.0" r="21" fill="#2a2f36" stroke="#4d8fd6" stroke-width="2"/><text x="76" y="94.0" text-anchor="middle" font-size="21" font-weight="700" fill="#4d8fd6">1</text><text x="114" y="64" text-anchor="end" font-size="13.5" font-weight="700" fill="#e2e5e9" transform="translate(0,0)"></text><text x="132" y="50" font-size="15" font-weight="700" fill="#e2e5e9">Set up the project</text><rect x="180" y="52" width="300" height="70" rx="9" fill="#23272d" stroke="#4d8fd6" stroke-width="1.6"/><rect x="180" y="52" width="4" height="70" rx="2" fill="#4d8fd6"/><text x="196" y="81.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Project Settings</text><text x="196" y="96.0" font-size="10.8" fill="#9aa0a8">Material library (.mat)  •  library-vs-scene priority</text><text x="196" y="109.0" font-size="10.8" fill="#9aa0a8">Deadline &amp; Chaos Cloud tool paths</text><text x="520" y="80" font-size="12.5" fill="#9aa0a8">File &gt; Project Settings.</text><text x="520" y="98" font-size="12.5" fill="#9aa0a8">These choices are consulted later when</text><text x="520" y="114" font-size="12.5" fill="#9aa0a8">materials are resolved and jobs are submitted.</text><line x1="118" y1="162" x2="118" y2="270" stroke="#3a4048" stroke-width="1"/><circle cx="76" cy="216.0" r="21" fill="#2a2f36" stroke="#3fae6a" stroke-width="2"/><text x="76" y="223.0" text-anchor="middle" font-size="21" font-weight="700" fill="#3fae6a">2</text><text x="114" y="186" text-anchor="end" font-size="13.5" font-weight="700" fill="#e2e5e9" transform="translate(0,0)"></text><text x="132" y="172" font-size="15" font-weight="700" fill="#e2e5e9">Build the scene</text><rect x="180" y="176" width="300" height="78" rx="9" fill="#23272d" stroke="#3fae6a" stroke-width="1.6"/><rect x="180" y="176" width="4" height="78" rx="2" fill="#3fae6a"/><text x="196" y="209.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Build from FBX</text><text x="196" y="224.0" font-size="10.8" fill="#9aa0a8">Resets scene → imports base + package FBX</text><text x="196" y="237.0" font-size="10.8" fill="#9aa0a8">Hierarchy becomes Max layers</text><rect x="392" y="185" width="78" height="17" rx="8.5" fill="#3fae6a"/><text x="431.0" y="197" text-anchor="middle" font-size="10" font-weight="700" fill="#12151a">or Scene</text><rect x="520" y="176" width="250" height="78" rx="9" fill="#23272d" stroke="#3fae6a" stroke-width="1.6"/><rect x="520" y="176" width="4" height="78" rx="2" fill="#3fae6a"/><text x="536" y="209.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Auto-generated setup</text><text x="536" y="224.0" font-size="10.8" fill="#9aa0a8">Layer States, Material Zones</text><text x="536" y="237.0" font-size="10.8" fill="#9aa0a8">and a Base/Package pass tree</text><text x="800" y="205" font-size="12.5" fill="#9aa0a8">The importer reads custom attributes</text><text x="800" y="223" font-size="12.5" fill="#9aa0a8">baked into the FBX and lays down the whole</text><text x="800" y="241" font-size="12.5" fill="#9aa0a8">Stage 3 + Stage 4 structure for you.</text><path d="M480,215 L516,215" stroke="#3fae6a" stroke-width="2" fill="none" marker-end="url(#ah)"/><line x1="118" y1="294" x2="118" y2="520" stroke="#3a4048" stroke-width="1"/><circle cx="76" cy="407.0" r="21" fill="#2a2f36" stroke="#8f7fd6" stroke-width="2"/><text x="76" y="414.0" text-anchor="middle" font-size="21" font-weight="700" fill="#8f7fd6">3</text><text x="114" y="318" text-anchor="end" font-size="13.5" font-weight="700" fill="#e2e5e9" transform="translate(0,0)"></text><text x="132" y="304" font-size="15" font-weight="700" fill="#e2e5e9">Author the ingredients</text><text x="132" y="322" font-size="11.5" fill="#9aa0a8">The five reusable building blocks — the Scene Manager panel</text><rect x="378" y="372" width="178" height="66" rx="9" fill="#23272d" stroke="#8f7fd6" stroke-width="1.6"/><rect x="378" y="372" width="4" height="66" rx="2" fill="#8f7fd6"/><text x="394" y="399.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Layer States</text><text x="394" y="414.0" font-size="10.8" fill="#9aa0a8">Which layers are ON</text><text x="394" y="427.0" font-size="10.8" fill="#9aa0a8">+ material per zone</text><rect x="180" y="372" width="178" height="66" rx="9" fill="#23272d" stroke="#3fae9d" stroke-width="1.6"/><rect x="180" y="372" width="4" height="66" rx="2" fill="#3fae9d"/><text x="196" y="399.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Material Zones</text><text x="196" y="414.0" font-size="10.8" fill="#9aa0a8">Groups of geometry</text><text x="196" y="427.0" font-size="10.8" fill="#9aa0a8">that swap material</text><rect x="576" y="372" width="178" height="66" rx="9" fill="#23272d" stroke="#8f7fd6" stroke-width="1.6"/><rect x="576" y="372" width="4" height="66" rx="2" fill="#8f7fd6"/><text x="592" y="399.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Light Rules</text><text x="592" y="414.0" font-size="10.8" fill="#9aa0a8">Per-light include /</text><text x="592" y="427.0" font-size="10.8" fill="#9aa0a8">exclude targeting</text><rect x="774" y="372" width="178" height="66" rx="9" fill="#23272d" stroke="#8f7fd6" stroke-width="1.6"/><rect x="774" y="372" width="4" height="66" rx="2" fill="#8f7fd6"/><text x="790" y="399.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Object Properties</text><text x="790" y="414.0" font-size="10.8" fill="#9aa0a8">V-Ray / Max prop</text><text x="790" y="427.0" font-size="10.8" fill="#9aa0a8">overrides per set</text><rect x="972" y="372" width="178" height="66" rx="9" fill="#23272d" stroke="#8f7fd6" stroke-width="1.6"/><rect x="972" y="372" width="4" height="66" rx="2" fill="#8f7fd6"/><text x="988" y="399.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Animation Sets</text><text x="988" y="414.0" font-size="10.8" fill="#9aa0a8">Keyframed motion</text><text x="988" y="427.0" font-size="10.8" fill="#9aa0a8">for named targets</text><path d="M269.0,438 L269.0,454 L467.0,454 L467.0,440" stroke="#3fae9d" stroke-width="1.8" fill="none" marker-end="url(#aht)"/><text x="368.0" y="468" text-anchor="middle" font-size="10.5" fill="#3fae9d">a State assigns a material to each Zone</text><text x="180" y="502" font-size="12" fill="#9aa0a8">Each block is defined once and reused everywhere. Change an ingredient and every pass that uses it updates — no per-variant scene surgery.</text><path d="M600,254 C600,312.0 267,312.0 267,370" stroke="#3fae6a" stroke-width="2" fill="none" marker-end="url(#ahv)" stroke-dasharray="5,4"/><line x1="118" y1="514" x2="118" y2="676" stroke="#3a4048" stroke-width="1"/><circle cx="76" cy="595.0" r="21" fill="#2a2f36" stroke="#4d8fd6" stroke-width="2"/><text x="76" y="602.0" text-anchor="middle" font-size="21" font-weight="700" fill="#4d8fd6">4</text><text x="114" y="538" text-anchor="end" font-size="13.5" font-weight="700" fill="#e2e5e9" transform="translate(0,0)"></text><text x="132" y="524" font-size="15" font-weight="700" fill="#e2e5e9">Assemble render passes</text><text x="132" y="542" font-size="11.5" fill="#9aa0a8">Combine ingredients into deliverables</text><rect x="430" y="566" width="320" height="96" rx="9" fill="#23272d" stroke="#4d8fd6" stroke-width="1.6"/><rect x="430" y="566" width="4" height="96" rx="2" fill="#4d8fd6"/><text x="446" y="608.0" font-size="14" font-weight="700" fill="#e2e5e9">Render Passes</text><text x="446" y="623.0" font-size="10.8" fill="#9aa0a8">Base Pass → references a Layer State</text><text x="446" y="636.0" font-size="10.8" fill="#9aa0a8">Package Pass → child, adds include/exclude deltas</text><text x="446" y="649.0" font-size="10.8" fill="#9aa0a8">+ camera, frame range, resolution, output name</text><path d="M467.0,438 C467.0,501.0 520,501.0 520,564" stroke="#8f7fd6" stroke-width="1.8" fill="none" marker-end="url(#ahv)"/><path d="M863.0,438 C863.0,501.0 590,501.0 590,564" stroke="#8f7fd6" stroke-width="1.8" fill="none" marker-end="url(#ahv)"/><path d="M1061.0,438 C1061.0,501.0 660,501.0 660,564" stroke="#8f7fd6" stroke-width="1.8" fill="none" marker-end="url(#ahv)"/><text x="770" y="592" font-size="12.5" fill="#9aa0a8">A pass references Layer States, Object</text><text x="770" y="610" font-size="12.5" fill="#9aa0a8">Properties and Animation Sets — it doesn’t</text><text x="770" y="628" font-size="12.5" fill="#9aa0a8">copy them, so edits flow through automatically.</text><line x1="118" y1="694" x2="118" y2="856" stroke="#3a4048" stroke-width="1"/><circle cx="76" cy="775.0" r="21" fill="#2a2f36" stroke="#d0a03f" stroke-width="2"/><text x="76" y="782.0" text-anchor="middle" font-size="21" font-weight="700" fill="#d0a03f">5</text><text x="114" y="718" text-anchor="end" font-size="13.5" font-weight="700" fill="#e2e5e9" transform="translate(0,0)"></text><text x="132" y="704" font-size="15" font-weight="700" fill="#e2e5e9">Apply &amp; check</text><text x="132" y="722" font-size="11.5" fill="#9aa0a8">Converge everything onto the live scene</text><rect x="400" y="748" width="380" height="92" rx="9" fill="#23272d" stroke="#d0a03f" stroke-width="1.6"/><rect x="400" y="748" width="4" height="92" rx="2" fill="#d0a03f"/><text x="416" y="788.0" font-size="14" font-weight="700" fill="#e2e5e9">Apply Configuration</text><text x="416" y="803.0" font-size="10.8" fill="#9aa0a8">Layer visibility + zone materials + light rules</text><text x="416" y="816.0" font-size="10.8" fill="#9aa0a8">+ object properties + animation + mtl override</text><text x="416" y="829.0" font-size="10.8" fill="#9aa0a8">→ the scene snaps into the pass. One undo step.</text><path d="M590,662 L590,746" stroke="#4d8fd6" stroke-width="2" fill="none" marker-end="url(#ah)"/><path d="M754,405.0 L778,405.0 L778,778 L784,778" stroke="#8f7fd6" stroke-width="1.8" fill="none" stroke-dasharray="1,0" marker-end="url(#ahv)"/><text x="784" y="772" font-size="10.5" fill="#8f7fd6">Light Rules apply here</text><rect x="820" y="800" width="190" height="40" rx="9" fill="#23272d" stroke="#d0a03f" stroke-width="1.6"/><rect x="820" y="800" width="4" height="40" rx="2" fill="#d0a03f"/><text x="836" y="814.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Preview render</text><text x="836" y="829.0" font-size="10.8" fill="#9aa0a8">Half-res viewport draft</text><path d="M782,820 L816,820" stroke="#d0a03f" stroke-width="2" fill="none" marker-end="url(#ah)"/><path d="M180,104 C120,104 96,420 96,760 C96,800 380,792 396,792" stroke="#9aa0a8" stroke-width="1.5" fill="none" stroke-dasharray="4,5" marker-end="url(#ahd)"/><text x="104" y="470" font-size="10.5" fill="#9aa0a8" transform="rotate(90 104 470)">Project Settings → material resolution</text><line x1="118" y1="878" x2="118" y2="1058" stroke="#3a4048" stroke-width="1"/><circle cx="76" cy="968.0" r="21" fill="#2a2f36" stroke="#4d8fd6" stroke-width="2"/><text x="76" y="975.0" text-anchor="middle" font-size="21" font-weight="700" fill="#4d8fd6">6</text><text x="114" y="902" text-anchor="end" font-size="13.5" font-weight="700" fill="#e2e5e9" transform="translate(0,0)"></text><text x="132" y="888" font-size="15" font-weight="700" fill="#e2e5e9">Validate &amp; submit</text><text x="132" y="906" font-size="11.5" fill="#9aa0a8">Preflight, then send to render</text><rect x="320" y="936" width="250" height="70" rx="9" fill="#23272d" stroke="#4d8fd6" stroke-width="1.6"/><rect x="320" y="936" width="4" height="70" rx="2" fill="#4d8fd6"/><text x="336" y="965.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Preflight check</text><text x="336" y="980.0" font-size="10.8" fill="#9aa0a8">Resolves cameras, materials,</text><text x="336" y="993.0" font-size="10.8" fill="#9aa0a8">frame ranges, duplicate names</text><rect x="522" y="945" width="38" height="17" rx="8.5" fill="#4d8fd6"/><text x="541.0" y="957" text-anchor="middle" font-size="10" font-weight="700" fill="#12151a">New</text><rect x="620" y="936" width="150" height="62" rx="9" fill="#23272d" stroke="#4d8fd6" stroke-width="1.6"/><rect x="620" y="936" width="4" height="62" rx="2" fill="#4d8fd6"/><text x="636" y="961.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Local Machine</text><text x="636" y="976.0" font-size="10.8" fill="#9aa0a8">Render in sequence</text><rect x="790" y="936" width="150" height="62" rx="9" fill="#23272d" stroke="#4d8fd6" stroke-width="1.6"/><rect x="790" y="936" width="4" height="62" rx="2" fill="#4d8fd6"/><text x="806" y="961.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Deadline farm</text><text x="806" y="976.0" font-size="10.8" fill="#9aa0a8">Per-pass job + snapshot</text><rect x="620" y="1014" width="320" height="56" rx="9" fill="#23272d" stroke="#4d8fd6" stroke-width="1.6"/><rect x="620" y="1014" width="4" height="56" rx="2" fill="#4d8fd6"/><text x="636" y="1036.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Chaos Cloud</text><text x="636" y="1051.0" font-size="10.8" fill="#9aa0a8">Export a .vrscene per pass and hand off to the client</text><path d="M570,967 L616,967" stroke="#4d8fd6" stroke-width="2" fill="none" marker-end="url(#ah)"/><path d="M560,960 C560,948.0 862,948.0 862,936" stroke="#4d8fd6" stroke-width="2" fill="none" marker-end="url(#ah)"/><path d="M500,992 C500,1003.0 640,1003.0 640,1014" stroke="#4d8fd6" stroke-width="2" fill="none" marker-end="url(#ah)"/><path d="M445,840 L445,934" stroke="#d0a03f" stroke-width="2" fill="none" marker-end="url(#ah)"/><text x="180" y="930" font-size="11.5" fill="#9aa0a8">Preflight surfaces problems while you can still fix them — not at 3am on the farm. Every override is baked into the per-pass scene copy.</text><line x1="118" y1="1066" x2="118" y2="1198" stroke="#3a4048" stroke-width="1"/><circle cx="76" cy="1132.0" r="21" fill="#2a2f36" stroke="#d67f9a" stroke-width="2"/><text x="76" y="1139.0" text-anchor="middle" font-size="21" font-weight="700" fill="#d67f9a">7</text><text x="114" y="1090" text-anchor="end" font-size="13.5" font-weight="700" fill="#e2e5e9" transform="translate(0,0)"></text><text x="132" y="1076" font-size="15" font-weight="700" fill="#e2e5e9">Output</text><text x="132" y="1094" font-size="11.5" fill="#9aa0a8">Frames feed the downstream pipeline</text><rect x="430" y="1112" width="300" height="72" rx="9" fill="#23272d" stroke="#d67f9a" stroke-width="1.6"/><rect x="430" y="1112" width="4" height="72" rx="2" fill="#d67f9a"/><text x="446" y="1142.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Rendered EXRs</text><text x="446" y="1157.0" font-size="10.8" fill="#9aa0a8">One clean file per pass</text><text x="446" y="1170.0" font-size="10.8" fill="#9aa0a8">named from the pass</text><rect x="790" y="1112" width="250" height="72" rx="9" fill="#23272d" stroke="#d67f9a" stroke-width="1.6"/><rect x="790" y="1112" width="4" height="72" rx="2" fill="#d67f9a"/><text x="806" y="1142.0" font-size="13.5" font-weight="700" fill="#e2e5e9">Downstream comp</text><text x="806" y="1157.0" font-size="10.8" fill="#9aa0a8">VCR Comp Manager</text><text x="806" y="1170.0" font-size="10.8" fill="#9aa0a8">(Nuke) picks them up</text><path d="M590,992 L580,1110" stroke="#4d8fd6" stroke-width="2" fill="none" marker-end="url(#ah)"/><path d="M730,1148 L786,1148" stroke="#d67f9a" stroke-width="2" fill="none" marker-end="url(#ah)"/><rect x="180" y="1234" width="820" height="70" rx="10" fill="#23272d" stroke="#3a4048"/><text x="200" y="1258" font-size="12.5" font-weight="700" fill="#e2e5e9">How to read this</text><line x1="200" y1="1278" x2="234" y2="1278" stroke="#4d8fd6" stroke-width="2.4" marker-end="url(#ah)"/><text x="244" y="1282" font-size="11.5" fill="#9aa0a8">pipeline flow (stage → stage)</text><line x1="430" y1="1278" x2="464" y2="1278" stroke="#8f7fd6" stroke-width="2.4" marker-end="url(#ahv)"/><text x="474" y="1282" font-size="11.5" fill="#9aa0a8">ingredient feeds a pass</text><line x1="640" y1="1278" x2="674" y2="1278" stroke="#9aa0a8" stroke-width="2" stroke-dasharray="4,5" marker-end="url(#ahd)"/><text x="684" y="1282" font-size="11.5" fill="#9aa0a8">setting used later</text><rect x="820" y="1271" width="14" height="14" rx="3" fill="#2a2f36" stroke="#3fae9d" stroke-width="1.6"/><text x="842" y="1282" font-size="11.5" fill="#9aa0a8">accent = node type</text></svg>